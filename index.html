<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMANSASOO Security System 2.0</title>
    <link rel="icon" href="assets/img/logo.png">
    <style>
        /* =====================================================
           DESIGN TOKENS
        ===================================================== */
        :root {
            --bg-deep:      #080c14;
            --bg-mid:       #0d1422;
            --glass-bg:     rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.13);
            --glass-hi:     rgba(255, 255, 255, 0.22);
            --text:         #ffffff;
            --text-dim:     rgba(255, 255, 255, 0.55);
            --accent:       #007aff;
            --accent-glow:  rgba(0, 122, 255, 0.35);
            --success:      #00e676;
            --warn:         #ff9500;
            --danger:       #ff3b30;
        }

        /* =====================================================
           RESET
        ===================================================== */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                         "Segoe UI", Roboto, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* =====================================================
           BODY — latar belakang gambar sekolah
        ===================================================== */
        body {
            min-height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            background:
                linear-gradient(160deg, rgba(8,12,20,.82) 0%, rgba(13,20,34,.75) 100%),
                url('assets/img/stg.jpg') center/cover no-repeat fixed;
        }

        /* Ambient glow overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 75% 20%, rgba(0,122,255,.14), transparent),
                radial-gradient(ellipse 50% 60% at 20% 80%, rgba(88,86,214,.12), transparent);
            pointer-events: none;
        }

        /* =====================================================
           SCAN LINE — tanda sistem keamanan aktif
           Ini adalah signature visual halaman ini:
           efek scan garis tipis berjalan dari atas ke bawah
           seperti radar/CCTV monitor — tidak ada di halaman lain
        ===================================================== */
        body::after {
            content: "";
            position: fixed;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0,230,118,.0) 20%,
                rgba(0,230,118,.55) 50%,
                rgba(0,230,118,.0) 80%,
                transparent 100%);
            animation: scanLine 5s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes scanLine {
            0%   { top: -2px; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 100vh; opacity: 0; }
        }

        /* =====================================================
           PORTAL CARD
        ===================================================== */
        .portal {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 52px 44px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow:
                0 32px 64px rgba(0,0,0,.45),
                0 0 0 1px rgba(255,255,255,.04) inset,
                0 1px 0 var(--glass-hi) inset;
            animation: rise .7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(24px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* =====================================================
           HEADER
        ===================================================== */
        .portal-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-wrap {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            background: rgba(255,255,255,.95);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 22px;
            box-shadow:
                0 8px 24px rgba(0,0,0,.35),
                0 0 0 1px rgba(255,255,255,.15) inset;
            transition: transform .3s ease, box-shadow .3s ease;
        }

        .logo-wrap:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 16px 36px rgba(0,0,0,.4), 0 0 32px var(--accent-glow);
        }

        .logo-wrap img {
            width: 68px;
            height: 68px;
            object-fit: contain;
            border-radius: 14px;
        }

        .portal-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -.4px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .portal-sub {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* =====================================================
           SYSTEM STATUS PILLS
        ===================================================== */
        .status-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 13px;
            border-radius: 999px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.1);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(255,255,255,.7);
            white-space: nowrap;
        }

        .pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            flex-shrink: 0;
            animation: breathe 2.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: .6; transform: scale(.8); }
        }

        /* =====================================================
           ROLE BUTTONS
        ===================================================== */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .role-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 18px 22px;
            background: rgba(255,255,255,.93);
            border: none;
            border-radius: 16px;
            text-decoration: none;
            color: #1c1c1e;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -.1px;
            box-shadow: 0 4px 16px rgba(0,0,0,.2);
            transition: all .22s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }

        .role-btn:hover {
            background: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 12px 32px var(--accent-glow), 0 4px 16px rgba(0,0,0,.25);
            color: var(--accent);
        }

        .role-btn:active { transform: translateY(0) scale(.98); }

        .role-icon {
            font-size: 24px;
            margin-right: 16px;
            flex-shrink: 0;
            transition: transform .2s ease;
        }

        .role-btn:hover .role-icon { transform: scale(1.15); }

        .role-meta {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .role-label { font-size: 15px; font-weight: 700; }
        .role-desc  { font-size: 11px; font-weight: 500; opacity: .55; margin-top: 1px; }

        /* =====================================================
           DIVIDER
        ===================================================== */
        .divider {
            height: 1px;
            background: rgba(255,255,255,.08);
            margin-bottom: 20px;
        }

        /* =====================================================
           FOOTER
        ===================================================== */
        .portal-footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.7;
        }

        .build-tag {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.08);
            font-size: 10px;
            letter-spacing: .5px;
            opacity: .6;
        }

        /* =====================================================
           RESPONSIVE — LANDSCAPE MOBILE / TABLET
        ===================================================== */
        @media (max-height: 600px) and (orientation: landscape) {
            body { overflow-y: auto; padding: 16px; align-items: flex-start; }

            .portal {
                max-width: 780px;
                padding: 28px 36px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto auto;
                column-gap: 40px;
                align-items: start;
            }

            .portal-header {
                grid-column: 1;
                grid-row: 1 / 3;
                align-items: flex-start;
                text-align: left;
                margin-bottom: 0;
            }

            .logo-wrap { width: 64px; height: 64px; border-radius: 16px; }
            .logo-wrap img { width: 48px; height: 48px; }
            .portal-title { font-size: 18px; }

            .status-row {
                grid-column: 2;
                grid-row: 1;
                justify-content: flex-start;
                margin-bottom: 16px;
            }

            .actions {
                grid-column: 2;
                grid-row: 2;
                margin-bottom: 0;
            }

            .divider { grid-column: 1 / 3; grid-row: 3; margin: 16px 0 12px; }

            .portal-footer { grid-column: 1 / 3; grid-row: 4; }

            .role-btn { padding: 13px 18px; }
            .role-icon { font-size: 20px; margin-right: 12px; }
            .role-label { font-size: 14px; }
        }

        /* DESKTOP 1920×1080 — sedikit lebih besar */
        @media (min-width: 1600px) {
            .portal { max-width: 500px; padding: 60px 52px 48px; }
            .logo-wrap { width: 100px; height: 100px; }
            .logo-wrap img { width: 78px; height: 78px; }
            .portal-title { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="portal">

    <!-- HEADER -->
    <header class="portal-header">
        <div class="logo-wrap">
            <img src="assets/img/logo.png" alt="Logo SMAN 1 Sooko"
                onerror="this.style.display='none';this.parentNode.innerHTML='🛡️';">
        </div>
        <h1 class="portal-title">SMANSASOO Security System</h1>
        <p class="portal-sub">CBT Lock &nbsp;•&nbsp; Version 2.0</p>
    </header>

    <!-- STATUS PILLS -->
    <div class="status-row">
        <div class="pill"><span class="dot"></span> SYSTEM</div>
        <div class="pill"><span class="dot"></span> OTP ACTIVE</div>
        <div class="pill"><span class="dot"></span> MONITORING</div>
    </div>

    <!-- ROLE BUTTONS -->
    <nav class="actions">
        <a href="panitia/index.html" class="role-btn">
            <span class="role-icon">🖥️</span>
            <span class="role-meta">
                <span class="role-label">Control Center</span>
                <span class="role-desc">Dashboard Panitia CBT</span>
            </span>
        </a>
        <a href="pengawas/index.html" class="role-btn">
            <span class="role-icon">🎓</span>
            <span class="role-meta">
                <span class="role-label">Supervisor Panel</span>
                <span class="role-desc">Dashboard Pengawas Ruangan</span>
            </span>
        </a>
    </nav>

    <div class="divider"></div>

    <!-- FOOTER -->
    <footer class="portal-footer">
        &copy; 2026 Tim IT SMAN 1 Sooko Mojokerto
        <br>
        <span class="build-tag">Build 2026.08.01</span>
    </footer>

</div>

</body>
</html>
