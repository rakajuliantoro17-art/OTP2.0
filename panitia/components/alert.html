<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alert System - SMANSASOO CBT</title>

<style>
/* =====================================================
   CORE VARIABLES (iOS Glass Style)
===================================================== */
:root {
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.5);
  --glass-highlight: rgba(255, 255, 255, 0.8);
  
  --text: #1c1c1e;
  --text-secondary: #6e6e73;
  
  --accent: #007aff;
  --warn: #ff9500;
  --danger: #ff3b30;
  --success: #34c759;
  
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  background: linear-gradient(135deg, #0b0f1a, #1a2235); /* Background gelap agar glass menonjol */
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* =====================================================
   CUSTOM SCROLLBAR (Mac Style)
===================================================== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.4); }

/* =====================================================
   GLASS PANEL CONTAINER
===================================================== */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: var(--shadow), inset 0 1px 1px var(--glass-highlight);
}

.wrapper {
  padding: 24px;
  width: 100%;
  max-width: 420px;
}

/* =====================================================
   HEADER & COUNTER
===================================================== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.header b {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

#count {
  background: var(--accent);
  color: white;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
}

/* =====================================================
   ALERT LIST & ITEMS (Notification Bubbles)
===================================================== */
.alert-box {
  height: 380px;
  overflow-y: auto;
  padding-right: 8px; /* Ruang untuk scrollbar */
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  background: rgba(255, 255, 255, 0.85); /* Gelembung putih */
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 16px;
  padding: 12px 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 6px;
  animation: slideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1); /* Elastic bounce */
}

/* TYPE ACCENTS (Border Kiri ala iOS Widget) */
.item.safe { border-left: 5px solid var(--success); }
.item.warn { border-left: 5px solid var(--warn); }
.item.danger { border-left: 5px solid var(--danger); }
.item.info { border-left: 5px solid var(--accent); }

.item b {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
}

.time {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
}

/* =====================================================
   BUTTON ACTION
===================================================== */
.btn {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 14px;
  background: var(--accent);
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
}

.btn:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
}

.btn:active {
  transform: scale(0.97);
}

/* =====================================================
   ANIMATIONS
===================================================== */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(30px) scale(0.95); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}
</style>
</head>

<body>

<div class="wrapper glass">

  <div class="header">
    <b>🚨 LIVE EVENT LOGS</b>
    <span id="count">0</span>
  </div>

  <div id="alertBox" class="alert-box"></div>

  <button class="btn" onclick="triggerRandomAlert()">Trigger Test Alert</button>

</div>

<script>
/* =====================================================
   ALERT COMPONENT ENGINE (Standalone Test)
===================================================== */
let alerts = [];

/* Fungsi Utama Menerima Data */
function pushAlert(type = "info", msg = "System event detected") {
  const data = {
    type,
    msg,
    time: new Date().toLocaleTimeString('id-ID')
  };

  alerts.unshift(data); // Tambah di paling atas
  
  // Batasi maksimal 20 log agar tidak berat
  if (alerts.length > 20) alerts.pop(); 
  
  render();
}

/* Fungsi Render ke DOM */
function render() {
  const box = document.getElementById("alertBox");
  box.innerHTML = "";

  alerts.forEach(a => {
    box.innerHTML += `
      <div class="item ${a.type}">
        <b>${a.msg}</b>
        <span class="time">${a.time}</span>
      </div>
    `;
  });

  document.getElementById("count").innerText = alerts.length;
}

/* =====================================================
   TESTING & SIMULATION
===================================================== */

// Data Dummy untuk disimulasikan saat tombol diklik
const dummyEvents = [
  { type: "safe", msg: "✅ Budi Santoso berhasil login ke sesi ujian." },
  { type: "warn", msg: "⚠️ Ahmad Maulana terdeteksi berpindah tab (Alt+Tab)." },
  { type: "danger", msg: "🚨 Eko Pratama mencapai batas 30 pelanggaran! Auto-Submit dijalankan." },
  { type: "info", msg: "ℹ️ Master OTP '541299' berhasil digenerate oleh Panitia." },
  { type: "warn", msg: "⚠️ Citra Kirana terdeteksi klik kanan (Right Click)." }
];

function triggerRandomAlert() {
  // Pilih event acak dari dummy array
  const randomEvent = dummyEvents[Math.floor(Math.random() * dummyEvents.length)];
  pushAlert(randomEvent.type, randomEvent.msg);
}

// Inisialisasi awal saat pertama dibuka
pushAlert("safe", "Sistem Alert UI berhasil dimuat.");

</script>

</body>
</html>
