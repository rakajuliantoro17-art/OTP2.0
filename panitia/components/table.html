<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoring Table Component - SMANSASOO CBT</title>

<style>
/* =====================================================
   CORE VARIABLES (iOS Glass Style)
===================================================== */
:root {
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.5);
  --glass-highlight: rgba(255, 255, 255, 0.8);
  
  --text: #1c1c1e;
  --text-secondary: #6e6e73;
  
  --accent: #007aff;
  --warn: #ff9500;
  --danger: #ff3b30;
  --success: #34c759;
  
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
  --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  /* Latar belakang gelap agar panel kaca terlihat jelas saat testing */
  background: linear-gradient(135deg, #0b0f1a, #1a2235);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* =====================================================
   CUSTOM SCROLLBAR (Mac Style)
===================================================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

/* =====================================================
   GLASS EFFECT & CONTAINER
===================================================== */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: var(--shadow), inset 0 1px 1px var(--glass-highlight);
}

.wrapper {
  padding: 24px;
  width: 100%;
  max-width: 1100px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* =====================================================
   CONTROL BAR (Search & Actions)
===================================================== */
.controlBar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controlBar h3 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* iOS Style Input Field */
input {
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.5);
  outline: none;
  width: 260px;
  font-size: 14px;
  color: var(--text);
  transition: all 0.2s ease;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
}

input:focus {
  background: #ffffff;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
}

/* iOS Style Button */
button {
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
}

button:hover { transform: scale(1.03); box-shadow: 0 6px 16px rgba(0, 122, 255, 0.3); }
button:active { transform: scale(0.96); }

/* =====================================================
   TABLE SYSTEM
===================================================== */
.tableBox {
  max-height: 500px;
  overflow-y: auto;
  border-radius: 16px;
  /* Tambahan border putih tipis di dalam untuk efek kaca */
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.2);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  text-align: left;
}

/* FROSTED GLASS HEADER */
thead th {
  position: sticky;
  top: 0;
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 10;
  padding: 14px 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

/* ROW ANIMATION & HOVER */
tr {
  cursor: pointer;
  transition: background 0.2s ease;
}

tr:hover {
  background: rgba(255, 255, 255, 0.7);
}

td {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  font-weight: 500;
}

/* =====================================================
   STATUS BADGES
===================================================== */
.badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  display: inline-block;
}

.badge-safe { background: #e5f9eb; color: var(--success); border: 1px solid rgba(52,199,89,0.2); }
.badge-warn { background: #fff4e5; color: var(--warn); border: 1px solid rgba(255,149,0,0.2); }
.badge-danger { background: #ffebeb; color: var(--danger); border: 1px solid rgba(255,59,48,0.2); }

/* Violation Number Highlight */
.vio-count {
  font-weight: 800;
  font-size: 15px;
}

/* =====================================================
   RESPONSIVE
===================================================== */
@media (max-width: 768px) {
  .controlBar { flex-direction: column; gap: 12px; align-items: flex-start; }
  input { width: 100%; }
}
</style>
</head>

<body>

        </div>

        <div class="table-actions">

                <th>Status</th>
            </tr>
        </thead>

        <tbody id="studentsTableBody">

        </tbody>

    </table>

</div>
