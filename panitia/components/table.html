<div class="table-panel glass">

    <div class="table-toolbar">
        <div class="table-title">LIVE MONITORING</div>
        <div class="table-actions">
            <input id="studentSearch" type="text" placeholder="Cari nama / kelas..."
                oninput="filterTableBySearch(this.value)">
            <button onclick="refreshStudents()">Refresh</button>
        </div>
    </div>

    <div class="tableBox">
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Kelas</th>
                    <th>Progress</th>
                    <th>Violation</th>
                    <th>Unlock</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="studentsTableBody"></tbody>
        </table>
    </div>

</div>
