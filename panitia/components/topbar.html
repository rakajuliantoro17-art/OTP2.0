<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topbar Component - SMANSASOO CBT</title>

    <style>
        /* =====================================================
           CORE VARIABLES (iOS Glass Style)
        ===================================================== */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-highlight: rgba(255, 255, 255, 0.8);
            
            --text: #1c1c1e;
            --text-secondary: #6e6e73;
            
            --accent: #007aff;
            --accent-muted: rgba(0, 122, 255, 0.1);
            --success: #34c759;
            
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            /* Latar belakang gelap agar panel kaca terlihat jelas saat testing */
            background: linear-gradient(135deg, #0b0f1a, #1a2235);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        /* =====================================================
           TOPBAR PANEL (Sticky iOS Style Navigation)
        ===================================================== */
        .topbar {
            width: 100%;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: var(--shadow-sm), inset 0 1px 1px var(--glass-highlight);
        }

        /* =====================================================
           LEFT SECTION (Branding Info)
        ===================================================== */
        .left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .title {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.2px;
            color: var(--text);
        }

        .subtitle {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* =====================================================
           RIGHT SECTION (Live Stats & Buttons)
        ===================================================== */
        .right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* BREATHING STATUS DOT (Animasi Nadi Hijau) */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            position: relative;
        }

        .dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite ease-out;
            top: 0;
            left: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        /* MINI STATS (Added to fix missing styling) */
        .mini-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
        }

        /* APPLE SYSTEM CLOCK */
        .clock {
            font-size: 14px;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.04);
            color: var(--text);
