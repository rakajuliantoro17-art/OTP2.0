<div class="topbar glass">

    <div class="left">
        <div class="title">CBT CONTROL HUB</div>
        <div class="subtitle">SMANSASOO — Panitia Dashboard</div>
    </div>

    <div class="right">
        <div class="status-indicator">
            <div class="dot" id="serverDot"></div>
            <span id="serverLabel">ONLINE</span>
        </div>

        <div class="mini-stat">
            <span>👥</span>
            <span id="topbarActive">0</span>
        </div>
        <div class="mini-stat">
            <span>⚠️</span>
            <span id="topbarWarn">0</span>
        </div>
        <div class="mini-stat">
            <span>🚨</span>
            <span id="topbarCritical">0</span>
        </div>

        <div class="clock" id="topbarClock">00:00:00</div>

        <button class="btn-danger" onclick="triggerGlobalOTP()">🔑 Global OTP</button>
    </div>

</div>

<script>
(function startClock() {
    function tick() {
        const el = document.getElementById('topbarClock');
        if (el) el.innerText = new Date().toLocaleTimeString('id-ID');
    }
    tick();
    setInterval(tick, 1000);
})();

function syncTopbarStats(data) {
    const warn     = data.filter(s => s.status === 'warn').length;
    const danger   = data.filter(s => s.status === 'danger').length;
    const active   = data.length;
    const el = id => document.getElementById(id);
    if (el('topbarActive'))   el('topbarActive').innerText   = active;
    if (el('topbarWarn'))     el('topbarWarn').innerText     = warn;
    if (el('topbarCritical')) el('topbarCritical').innerText = danger;
}
window.syncTopbarStats = syncTopbarStats;
</script>
