<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Topbar Component - SMANSASOO CBT</title>

<style>
/* =====================================================
   CORE VARIABLES (iOS Glass Style)
===================================================== */
:root {
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.5);
  --glass-highlight: rgba(255, 255, 255, 0.8);
  
  --text: #1c1c1e;
  --text-secondary: #6e6e73;
  
  --accent: #007aff;
  --accent-muted: rgba(0, 122, 255, 0.1);
  --success: #34c759;
  
  --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.06);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  /* Latar belakang gelap agar panel kaca terlihat jelas saat testing */
  background: linear-gradient(135deg, #0b0f1a, #1a2235);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
}

/* =====================================================
   TOPBAR PANEL (Sticky iOS Style Navigation)
===================================================== */
.topbar {
  width: 100%;
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 50;
  
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  box-shadow: var(--shadow-sm), inset 0 1px 1px var(--glass-highlight);
}

/* =====================================================
   LEFT SECTION (Branding Info)
===================================================== */
.left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.title {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.2px;
  color: var(--text);
}

.subtitle {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* =====================================================
   RIGHT SECTION (Live Stats & Buttons)
===================================================== */
.right {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* BREATHING STATUS DOT (Animasi Nadi Hijau) */
.status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  position: relative;
}

.dot::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite ease-out;
  top: 0;
  left: 0;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(3.5); opacity: 0; }
}

/* APPLE SYSTEM CLOCK */
.clock {
  font-size: 14px;
  font-weight: 700;
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.04);
  color: var(--text);
  letter-spacing: 0.5px;
  border: 1px solid rgba(0, 0, 0, 0.02);
}

/* BUTTONS GROUP */
.btn {
  padding: 9px 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn:hover {
  transform: scale(1.03);
}

.btn:active {
  transform: scale(0.97);
}

.btn-secondary {
  background: rgba(0, 0, 0, 0.05);
  color: var(--text);
}
.btn-secondary:hover { background: rgba(0, 0, 0, 0.08); }

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 12px rgba(0, 122, 255, 0.25);
}
.btn-primary:hover { box-shadow: 0 6px 16px rgba(0, 122, 255, 0.35); }

</style>
</head>

<body>

<header class="topbar glass">

    <div class="left">

        <div class="title">
            SMANSASOO CBT CONTROL TOWER
        </div>

        <div class="subtitle">
            CBT Security Monitoring • 1500 Concurrent Users Ready
        </div>

    </div>

    <div class="right">

        <div class="status-indicator">

            <div
                id="firebaseDot"
                class="dot">
            </div>

            <span id="firebaseStatus">
                CONNECTING
            </span>

        </div>

        <div class="mini-stat">

            <span>👥</span>

            <b id="topActive">
                0
            </b>

        </div>

        <div class="mini-stat">

            <span>🚨</span>

            <b id="topAlert">
                0
            </b>

        </div>

        <div
            id="clock"
            class="clock">

            00:00:00

        </div>

        <button

            onclick="refreshSystem()">

            Refresh

        </button>

        <button
            class="btn btn-primary"
            onclick="triggerGlobalOTP()">

            Global OTP

        </button>

    </div>

</header>

</body>
</html>
