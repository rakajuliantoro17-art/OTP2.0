<!DOCTYPE html>
<html lang="id">

/* =====================================================
   CORE VARIABLES (iOS Glass Style)
===================================================== */
:root {
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.5);
  --glass-highlight: rgba(255, 255, 255, 0.8);
  
  --text: #1c1c1e;
  --text-secondary: #6e6e73;
  
  --accent: #007aff;
  --warn: #ff9500;
  --danger: #ff3b30;
  --success: #34c759;
  
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  background: linear-gradient(135deg, #0b0f1a, #1a2235);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}

/* Tombol Trigger untuk Testing */
.trigger-btn {
  padding: 14px 24px;
  border-radius: 14px;
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  transition: all 0.3s ease;
}
.trigger-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

/* =====================================================
   DRAWER PANEL (Floating iPadOS Style)
===================================================== */
.drawer {
  position: fixed;
  right: -420px; /* Sembunyikan di luar layar */
  top: 16px;
  bottom: 16px;
  width: 380px;
  padding: 28px;
  
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 28px; /* Lebih membulat */
  box-shadow: -10px 0 40px rgba(0,0,0,0.15), inset 0 1px 1px var(--glass-highlight);
  
  transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); /* Efek pantul/elastis */
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.drawer.active {
  right: 16px; /* Floating margin */
}

/* =====================================================
   HEADER & STATUS BADGE
===================================================== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

#name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
#class { font-size: 14px; color: var(--text-secondary); font-weight: 500; }

.badge {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.safe { background: #e5f9eb; color: var(--success); border: 1px solid rgba(52,199,89,0.3); }
.warn { background: #fff4e5; color: var(--warn); border: 1px solid rgba(255,149,0,0.3); }
.danger { background: #ffebeb; color: var(--danger); border: 1px solid rgba(255,59,48,0.3); }

/* =====================================================
   INFO CARD (Inner Glass)
===================================================== */
.info-card {
  background: rgba(255, 255, 255, 0.4);
  border-radius: 18px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border: 1px solid rgba(255,255,255,0.6);
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
}

.info-row b {
  color: var(--text);
  font-size: 16px;
  font-weight: 700;
}

/* =====================================================
   ACTION BUTTONS
===================================================== */
.actions {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
