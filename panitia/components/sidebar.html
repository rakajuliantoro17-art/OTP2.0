<aside class="sidebar glass">

    <div class="brand">
        <div class="brand-img">
            <img src="/assets/img/logo.png" alt="S"
                onerror="this.style.display='none'; this.parentNode.innerHTML='🛡️';">
        </div>
        <div class="brand-text">
            <b>SMANSASOO</b>
            <small>CBT CONTROL HUB</small>
        </div>
    </div>

    <div class="statusItem">
        <span>OTP ACTIVE</span>
        <span class="badge safe" id="otpCounter">0</span>
    </div>
    <div class="statusItem">
        <span>UNLOCK REQ</span>
        <span class="badge warn" id="unlockCounter">0</span>
    </div>
    <div class="statusItem">
        <span>CRITICAL</span>
        <span class="badge danger" id="criticalCounter">0</span>
    </div>

    <div class="menu active" onclick="navigate(this, 'dashboard')">
        <span class="icon">📊</span> Dashboard
    </div>
    <div class="menu" onclick="navigate(this, 'monitor')">
        <span class="icon">🧠</span> Monitor Siswa
    </div>
    <div class="menu" onclick="navigate(this, 'otp')">
        <span class="icon">🔑</span> OTP Center
    </div>
    <div class="menu" onclick="navigate(this, 'alert')">
        <span class="icon">🚨</span> Alert System
    </div>
    <div class="menu" onclick="navigate(this, 'log')">
        <span class="icon">📜</span> Audit Log
    </div>

    <div class="spacer"></div>
    <div class="divider"></div>

    <div class="statusItem">
        <span>SERVER</span>
        <span class="badge safe" id="serverStatus">ONLINE</span>
    </div>

    <div class="statusBox">
        <div class="statusItem">
            <span>ACTIVE</span>
            <span class="badge safe" id="sActive">0</span>
        </div>
        <div class="statusItem">
            <span>WARNING</span>
            <span class="badge warn" id="sWarn">0</span>
        </div>
        <div class="statusItem">
            <span>CRITICAL</span>
            <span class="badge danger" id="sDanger">0</span>
        </div>
    </div>

    <div class="quickActions">
        <button onclick="triggerGlobalOTP()">🔑 Global OTP</button>
        <button onclick="generateSystemOTP()">♻ Refresh OTP</button>
        <button onclick="filterTable('danger')">🚨 Critical</button>
    </div>

</aside>

<script>
function navigate(element, page) {
    document.querySelectorAll('.menu').forEach(m => m.classList.remove('active'));
    element.classList.add('active');
    console.log('[NAV]', page);
}

function syncSidebarStats(data) {
    const warn   = data.filter(s => s.status === 'warn').length;
    const danger = data.filter(s => s.status === 'danger').length;
    const active = data.length;
    const el = id => document.getElementById(id);
    if (el('sActive'))        el('sActive').innerText        = active;
    if (el('sWarn'))          el('sWarn').innerText          = warn;
    if (el('sDanger'))        el('sDanger').innerText        = danger;
    if (el('criticalCounter'))el('criticalCounter').innerText= danger;
}
window.syncSidebarStats = syncSidebarStats;
</script>
