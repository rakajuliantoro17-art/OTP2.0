<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stats Panel Component - SMANSASOO CBT</title>

<style>
/* =====================================================
   CORE VARIABLES (iOS Glass Style)
===================================================== */
:root {
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.5);
  --glass-highlight: rgba(255, 255, 255, 0.9); /* Efek pantulan cahaya tajam */
  
  --text: #1c1c1e;
  --text-secondary: #6e6e73;
  
  --accent: #007aff;
  --warn: #ff9500;
  --danger: #ff3b30;
  --success: #34c759;
  
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
  --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  /* Latar belakang gelap agar panel kaca terlihat jelas saat testing */
  background: linear-gradient(135deg, #0b0f1a, #1a2235);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center; /* Posisi di tengah untuk standalone testing */
  justify-content: center;
}

/* =====================================================
   GLASS EFFECT & CONTAINER
===================================================== */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: var(--shadow-sm), inset 0 1px 1px var(--glass-highlight);
}

.wrapper {
  padding: 24px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  width: 100%;
  max-width: 1000px;
}

/* =====================================================
   STAT CARDS
===================================================== */
.card {
  padding: 24px 20px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.card:hover {
  transform: translateY(-6px) scale(1.02); /* Melayang dan membesar sedikit */
  box-shadow: var(--shadow), inset 0 1px 2px var(--glass-highlight);
}

/* =====================================================
   TYPOGRAPHY
===================================================== */
.label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
  text-transform: uppercase;
}

.value {
  font-size: 46px;
  font-weight: 800;
  letter-spacing: -1.5px; /* Rapat ala desain Apple */
  margin: 8px 0;
  line-height: 1;
  transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Class animasi untuk efek pop saat data berubah */
.pop {
  transform: scale(1.15);
}

/* COLOR ACCENTS */
.info { color: var(--accent); }
.safe { color: var(--success); }
.warn { color: var(--warn); }
.danger { color: var(--danger); }

.trend {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  opacity: 0.9;
}

/* =====================================================
   RESPONSIVE GUARD
===================================================== */
@media (max-width: 768px) {
  .wrapper { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .wrapper { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="card glass">
    <div class="label">👥 Active Users</div>
    <div class="value info" id="active">1487</div>
    <div class="trend">+ realtime connected</div>
  </div>

  <div class="card glass">
    <div class="label">✅ Safe State</div>
    <div class="value safe" id="safe">1420</div>
    <div class="trend">normal behavior</div>
  </div>

  <div class="card glass">
    <div class="label">⚠️ Warning</div>
    <div class="value warn" id="warn">52</div>
    <div class="trend">minor violation detected</div>
  </div>

  <div class="card glass">
    <div class="label">🚨 Critical</div>
    <div class="value danger" id="danger">15</div>
    <div class="trend">immediate attention</div>
  </div>

</div>

<script>
/* =====================================================
   STATS ENGINE (Standalone UI Test Logic)
===================================================== */

let stats = {
  active: 1487,
  safe: 1420,
  warn: 52,
  danger: 15
};

/* Memori untuk menyimpan nilai sebelumnya agar tahu kapan harus dianimasikan */
let previousStats = { ...stats };

/* FUNGSI UPDATE UI DENGAN ANIMASI POP */
function updateDOMValue(id, newValue, oldValue) {
  const el = document.getElementById(id);
  el.innerText = newValue;

  // Jika nilai berubah, jalankan animasi "pop"
  if (newValue !== oldValue) {
    el.classList.add("pop");
    setTimeout(() => {
      el.classList.remove("pop");
    }, 200); // Hapus class pop setelah 0.2 detik (transisi selesai)
  }
}

/* RENDER FUNCTION */
function renderStats() {
  updateDOMValue("active", stats.active, previousStats.active);
  updateDOMValue("safe", stats.safe, previousStats.safe);
  updateDOMValue("warn", stats.warn, previousStats.warn);
  updateDOMValue("danger", stats.danger, previousStats.danger);

  // Simpan nilai terbaru sebagai nilai lama untuk siklus berikutnya
  previousStats = { ...stats };
}

// Render pertama kali saat halaman dimuat
renderStats();

/* =====================================================
   SIMULATED REALTIME UPDATE
===================================================== */
setInterval(() => {
  // Simulasi fluktuasi angka
  let activeChange = Math.floor(Math.random() * 3 - 1);
  let warnChange = Math.floor(Math.random() * 2 - 1);
  let dangerChange = Math.floor(Math.random() * 2 - 1);

  // Ubah nilai state
  stats.active += activeChange;
  stats.warn += warnChange;
  stats.danger += dangerChange;

  // Guard: Batas minimum agar angka tidak rusak
  stats.active = Math.max(1400, stats.active);
  stats.warn = Math.max(0, stats.warn);
  stats.danger = Math.max(0, stats.danger);

  // Karena Active bertambah/berkurang, nilai Safe adalah sisa dari yang tidak melanggar
  stats.safe = stats.active - stats.warn - stats.danger;

  // Render ulang
  renderStats();

}, 3000); // Update setiap 3 detik

</script>

</body>
</html>
