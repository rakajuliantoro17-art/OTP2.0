<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SMANSASOO CBT LOCK 2.0 - PANITIA</title>

<link rel="icon" href="./assets/img/logo.png">

<link rel="stylesheet" href="./css/dashboard.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div id="sidebarMount"></div>

    <!-- MAIN -->
    <main class="main">

        <div id="topbarMount"></div>

        <div id="statsMount"></div>

        <div id="tableMount"></div>

    </main>

</div>

<!-- DRAWER -->
<div id="drawerMount"></div>

<!-- ALERT STREAM -->
<div id="alertMount"></div>

<!-- OTP MODAL -->
<div id="otpModal" class="otp-modal">

    <div class="glass otp-box">

        <h2>TOKEN OTP DIHASILKAN</h2>

        <div id="otpValue">000000</div>

        <button
            class="btn btn-secondary"
            onclick="closeOTPModal()"
            style="width:100%;"
        >
            Selesai & Tutup
        </button>

    </div>

</div>

<script>

async function loadComponent(id,file){

    try{

        const mount=document.getElementById(id);

        if(!mount){
            console.warn("Mount not found:",id);
            return;
        }

        const response=await fetch(file);

        if(!response.ok){
            throw new Error(
                file+" : "+response.status
            );
        }

        const html=await response.text();

        mount.innerHTML=html;

        const scripts=mount.querySelectorAll("script");

        scripts.forEach(oldScript=>{

            const newScript=
                document.createElement("script");

            if(oldScript.src){

                newScript.src=
                    oldScript.src;

            }else{

                newScript.textContent=
                    oldScript.textContent;

            }

            document.body.appendChild(
                newScript
            );

            oldScript.remove();

        });

    }catch(error){

        console.error(
            "Component Load Error",
            file,
            error
        );

    }

}

async function initializeDashboard(){

    await Promise.all([

        loadComponent(
            "sidebarMount",
            "./components/sidebar.html"
        ),

        loadComponent(
            "topbarMount",
            "./components/topbar.html"
        ),

        loadComponent(
            "statsMount",
            "./components/stats.html"
        ),

        loadComponent(
            "tableMount",
            "./components/table.html"
        ),

        loadComponent(
            "drawerMount",
            "./components/drawer.html"
        ),

        loadComponent(
            "alertMount",
            "./components/alert.html"
        )

    ]);

    console.log(
        "SMANSASOO CBT PANITIA READY"
    );

}

document.addEventListener(
    "DOMContentLoaded",
    initializeDashboard
);

function closeOTPModal(){

    document
        .getElementById("otpModal")
        ?.classList.remove("open");

}

function openOTPModal(code){

    document
        .getElementById("otpValue")
        .textContent=code;

    document
        .getElementById("otpModal")
        .classList.add("open");

}

</script>

<script src="./js/firebase.js"></script>
<script src="./js/otp.js"></script>
<script src="./js/realtime.js"></script>
<script src="./js/ui.js"></script>

</body>
</html>
