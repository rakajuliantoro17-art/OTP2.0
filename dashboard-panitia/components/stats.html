<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stats Panel - SMANSASOO CBT</title>

<style>
:root{
  --glass-bg: rgba(255,255,255,0.55);
  --glass-border: rgba(0,0,0,0.08);
  --text:#1c1c1e;
  --accent:#007aff;
  --warn:#ff9500;
  --danger:#ff3b30;
  --success:#34c759;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#0b0f1a;
  color:var(--text);
}

/* GLASS */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);
  border-radius:16px;
}

/* WRAPPER */
.wrapper{
  padding:18px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

/* CARD */
.card{
  padding:16px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.03);
}

/* BIG NUMBER */
.value{
  font-size:26px;
  font-weight:bold;
  margin-top:8px;
}

/* LABEL */
.label{
  font-size:12px;
  opacity:.7;
}

/* COLORS */
.safe{color:var(--success);}
.warn{color:var(--warn);}
.danger{color:var(--danger);}
.info{color:var(--accent);}

/* TREND */
.trend{
  font-size:11px;
  margin-top:6px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- ACTIVE -->
  <div class="card glass">
    <div class="label">ACTIVE STUDENTS</div>
    <div class="value info" id="active">1487</div>
    <div class="trend">+ realtime connected</div>
  </div>

  <!-- SAFE -->
  <div class="card glass">
    <div class="label">SAFE</div>
    <div class="value safe" id="safe">1420</div>
    <div class="trend">normal behavior</div>
  </div>

  <!-- WARNING -->
  <div class="card glass">
    <div class="label">WARNING</div>
    <div class="value warn" id="warn">52</div>
    <div class="trend">minor violation detected</div>
  </div>

  <!-- CRITICAL -->
  <div class="card glass">
    <div class="label">CRITICAL</div>
    <div class="value danger" id="danger">15</div>
    <div class="trend">immediate attention</div>
  </div>

</div>

<script>

/* =========================
   STATS ENGINE (READY FIREBASE LAYER 4)
========================= */

let stats = {
  active: 1487,
  safe: 1420,
  warn: 52,
  danger: 15
};

/* RENDER */
function renderStats(){
  document.getElementById("active").innerText = stats.active;
  document.getElementById("safe").innerText = stats.safe;
  document.getElementById("warn").innerText = stats.warn;
  document.getElementById("danger").innerText = stats.danger;
}

renderStats();

/* =========================
   SIMULATED REALTIME UPDATE
========================= */
setInterval(()=>{

  // simulasi dynamic CBT behavior
  stats.active += Math.floor(Math.random()*3 - 1);
  stats.warn += Math.floor(Math.random()*2 - 1);
  stats.danger += Math.floor(Math.random()*2 - 1);

  // guard minimum
  stats.active = Math.max(1400, stats.active);
  stats.warn = Math.max(0, stats.warn);
  stats.danger = Math.max(0, stats.danger);

  renderStats();

  // FIREBASE READY HOOK
  // firebase.database().ref("stats").set(stats);

},3000);

</script>

</body>
</html>
