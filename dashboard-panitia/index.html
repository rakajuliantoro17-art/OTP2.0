<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMANSASOO CBT CONTROL TOWER - FINAL</title>

<style>
:root{
  --accent:#007aff;
  --warn:#ff9500;
  --danger:#ff3b30;
  --success:#34c759;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  height:100vh;
  overflow:hidden;
  background:url('./assets/img/stg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:white;
}

/* GLASS FINAL */
.glass{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(26px) saturate(180%);
  -webkit-backdrop-filter:blur(26px);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:18px;
}

/* LAYOUT */
.container{
  display:flex;
  height:100vh;
  min-width:1280px;
}

.sidebar{
  width:260px;
  padding:18px;
}

.main{
  flex:1;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  padding:14px;
  text-align:center;
}

/* TABLE */
.table{
  flex:1;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.08);
}

/* STATUS */
.safe{color:var(--success);}
.warn{color:var(--warn);}
.danger{color:var(--danger);}

/* DRAWER */
.drawer{
  position:fixed;
  right:-380px;
  top:0;
  width:360px;
  height:100vh;
  padding:20px;
  transition:.25s;
}

.drawer.active{right:0;}

/* OTP */
.otp{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.4);
}

.otp.active{display:flex;}

#otpValue{
  font-size:48px;
  color:var(--accent);
  font-weight:bold;
}

/* ALERT */
.alert{
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  max-height:220px;
  overflow:auto;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar glass">
  <b>SMANSASOO</b>
  <small>CBT FINAL TOWER</small>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar glass">
  <div><b>CONTROL TOWER FINAL</b></div>
  <div id="clock"></div>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card glass">ACTIVE <b id="active">0</b></div>
  <div class="card glass">WARN <b id="warn">0</b></div>
  <div class="card glass">DANGER <b id="danger">0</b></div>
  <div class="card glass" onclick="globalOTP()">OTP</div>
</div>

<!-- TABLE -->
<div class="glass table">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Progress</th>
<th>Violation</th>
<th>Status</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer glass">
  <h3 id="name"></h3>
  <p id="info"></p>
  <button onclick="otp()">OTP</button>
  <button onclick="closeDrawer()">Close</button>
</div>

<!-- OTP -->
<div id="otp" class="otp glass">
  <div>
    <h2>OTP</h2>
    <div id="otpValue">000000</div>
    <button onclick="closeOTP()">Close</button>
  </div>
</div>

<!-- ALERT -->
<div class="alert glass">
  <b>LOG</b>
  <div id="log"></div>
</div>

<script>

/* =========================
   LAYER 7 INTELLIGENCE CORE
========================= */

let selected=null;

/* MOCK DB */
let students={
  1:{name:"Ahmad",class:"XI-4",progress:30,violation:1,status:"safe"},
  2:{name:"Budi",class:"XI-2",progress:22,violation:5,status:"warn"},
  3:{name:"Rina",class:"XI-1",progress:40,violation:7,status:"danger"}
};

/* RENDER */
function render(){
  let t=document.getElementById("table");
  t.innerHTML="";
  Object.keys(students).forEach(id=>{
    let s=students[id];

    t.innerHTML+=`
    <tr onclick="openD(${id})">
      <td>${s.name}</td>
      <td>${s.class}</td>
      <td>${s.progress}/40</td>
      <td>${s.violation}</td>
      <td class="${s.status}">${s.status.toUpperCase()}</td>
    </tr>`;
  });
}
render();

/* DRAWER */
function openD(id){
  selected=students[id];
  document.getElementById("name").innerText=selected.name;
  document.getElementById("info").innerText=
    selected.class+" | "+selected.progress+" | "+selected.violation;

  document.getElementById("drawer").classList.add("active");
  log("OPEN "+selected.name);

  riskEngine(selected);
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("active");
}

/* =========================
   LAYER 7: INTELLIGENCE ENGINE
========================= */

function riskEngine(s){

  if(s.violation>=6){
    s.status="danger";
  } else if(s.violation>=3){
    s.status="warn";
  } else {
    s.status="safe";
  }

  render();
}

/* FAKE DETECTION ENGINE (HOOK READY) */
document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    log("TAB SWITCH DETECTED");
    if(selected){
      selected.violation++;
      riskEngine(selected);
    }
  }
});

/* FULLSCREEN EXIT SIMULATION */
document.addEventListener("fullscreenchange",()=>{
  log("FULLSCREEN CHANGE DETECTED");
});

/* =========================
   OTP SYSTEM
========================= */

function otp(){
  let code=Math.floor(100000+Math.random()*900000);
  document.getElementById("otpValue").innerText=code;
  document.getElementById("otp").classList.add("active");
  log("OTP "+selected?.name);
}

function closeOTP(){
  document.getElementById("otp").classList.remove("active");
}

function globalOTP(){
  let code=Math.floor(100000+Math.random()*900000);
  document.getElementById("otpValue").innerText=code;
  document.getElementById("otp").classList.add("active");
  log("GLOBAL OTP");
}

/* =========================
   LOG SYSTEM
========================= */

function log(t){
  let d=document.getElementById("log");
  let el=document.createElement("div");
  el.innerText="• "+t;
  d.prepend(el);
}

setInterval(()=>{
  document.getElementById("clock").innerText=
  new Date().toLocaleTimeString();
},1000);

</script>

</body>
</html>
