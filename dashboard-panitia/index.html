<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMANSASOO CBT LOCK 2.0 - LAYER 5 PANITIA</title>

<style>
:root {
  --accent:#007aff;
  --warn:#ff9500;
  --danger:#ff3b30;
  --success:#34c759;
}

/* ===== BASE ===== */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body {
  height:100vh;
  overflow:hidden;
  background:url('./assets/img/stg.jpg') no-repeat center center fixed;
  background-size:cover;
  color:#fff;
}

/* ===== GLASS iOS 17 STYLE ===== */
.glass {
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid rgba(255,255,255,0.22);
  box-shadow:0 10px 40px rgba(0,0,0,0.25);
  border-radius:18px;
}

/* ===== LAYOUT ===== */
.container {
  display:flex;
  height:100vh;
  min-width:1280px;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width:280px;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu {
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
  color:#fff;
}

.menu:hover {
  background:rgba(255,255,255,0.15);
}

/* ===== MAIN ===== */
.main {
  flex:1;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ===== TOPBAR ===== */
.topbar {
  display:flex;
  justify-content:space-between;
  padding:14px 18px;
}

/* ===== CARDS ===== */
.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card {
  padding:14px;
  text-align:center;
  cursor:pointer;
}

/* ===== TABLE ===== */
.table {
  flex:1;
  overflow:auto;
}

table {
  width:100%;
  border-collapse:collapse;
}

thead th {
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

th,td {
  padding:10px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:hover {
  background:rgba(255,255,255,0.08);
}

.status-safe { color:var(--success); }
.status-warn { color:var(--warn); }
.status-danger { color:var(--danger); }

/* ===== DRAWER ===== */
.drawer {
  position:fixed;
  top:0;
  right:-380px;
  width:360px;
  height:100vh;
  padding:20px;
  transition:.25s;
}

.drawer.active { right:0; }

/* ===== OTP ===== */
.otp-modal {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.4);
}

.otp-modal.active { display:flex; }

#otpValue {
  font-size:46px;
  font-weight:bold;
  color:var(--accent);
}

/* ===== ALERT ===== */
.alert {
  position:fixed;
  bottom:20px;
  right:20px;
  width:280px;
  max-height:220px;
  overflow:auto;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar glass">
  <b>SMANSASOO</b>
  <small>CBT LOCK LAYER 5</small>

  <div class="menu">Dashboard</div>
  <div class="menu">Aman</div>
  <div class="menu">Warning</div>
  <div class="menu">Critical</div>
  <div class="menu">Realtime</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar glass">
  <div><b>SMANSASOO CONTROL CENTER</b></div>
  <div id="clock"></div>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card glass">ACTIVE<br><b id="c-active">0</b></div>
  <div class="card glass">WARNING<br><b id="c-warn">0</b></div>
  <div class="card glass">CRITICAL<br><b id="c-danger">0</b></div>
  <div class="card glass" onclick="generateGlobalOTP()">GLOBAL OTP</div>
</div>

<!-- TABLE -->
<div class="glass table">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Progress</th>
<th>Violation</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>
</div>

<!-- DRAWER -->
<div id="drawer" class="drawer glass">
  <h3 id="d-name"></h3>
  <p id="d-class"></p>
  <p id="d-progress"></p>
  <p id="d-violation"></p>
  <p id="d-status"></p>

  <button onclick="openOTP()">OTP</button>
  <button onclick="closeDrawer()">Close</button>
</div>

<!-- OTP -->
<div id="otpModal" class="otp-modal glass">
  <div>
    <h2>GLOBAL OTP</h2>
    <div id="otpValue">000000</div>
    <button onclick="closeOTP()">Close</button>
  </div>
</div>

<!-- ALERT -->
<div class="alert glass">
  <b>ALERT</b>
  <div id="alertList"></div>
</div>

<!-- CLOCK -->
<script>
setInterval(()=> {
  document.getElementById("clock").innerText =
  new Date().toLocaleTimeString();
},1000);
</script>

<!-- ===== LAYER 5 ENGINE ===== -->
<script>

let selectedStudent = null;

/* ===== MOCK (FIREBASE READY REPLACEMENT) ===== */
let students = {
  A1:{name:"Ahmad",class:"XI-4",progress:25,violation:2,status:"warn"},
  A2:{name:"Budi",class:"XI-2",progress:18,violation:6,status:"danger"},
  A3:{name:"Rina",class:"XI-1",progress:38,violation:0,status:"safe"}
};

/* ===== RENDER ===== */
function render(){
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML="";

  Object.keys(students).forEach(id=>{
    let s = students[id];

    tbody.innerHTML += `
      <tr onclick="openDrawer('${id}')">
        <td>${s.name}</td>
        <td>${s.class}</td>
        <td>${s.progress}/40</td>
        <td>${s.violation}</td>
        <td class="status-${s.status}">${s.status.toUpperCase()}</td>
      </tr>
    `;
  });
}
render();

/* ===== DRAWER ===== */
function openDrawer(id){
  selectedStudent = students[id];

  document.getElementById("d-name").innerText = selectedStudent.name;
  document.getElementById("d-class").innerText = selectedStudent.class;
  document.getElementById("d-progress").innerText = selectedStudent.progress;
  document.getElementById("d-violation").innerText = selectedStudent.violation;
  document.getElementById("d-status").innerText = selectedStudent.status;

  document.getElementById("drawer").classList.add("active");
  addAlert("OPEN " + selectedStudent.name);
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("active");
}

/* ===== OTP ===== */
function openOTP(){
  if(!selectedStudent) return;

  let otp = Math.floor(100000 + Math.random()*900000);

  document.getElementById("otpValue").innerText = otp;
  document.getElementById("otpModal").classList.add("active");

  addAlert("OTP → " + selectedStudent.name);
}

function closeOTP(){
  document.getElementById("otpModal").classList.remove("active");
}

/* ===== GLOBAL OTP (FIREBASE HOOK READY) ===== */
function generateGlobalOTP(){
  let otp = Math.floor(100000 + Math.random()*900000);

  console.log("FIREBASE PUSH OTP:", otp);

  document.getElementById("otpValue").innerText = otp;
  document.getElementById("otpModal").classList.add("active");

  addAlert("GLOBAL OTP GENERATED");
}

/* ===== ALERT ===== */
function addAlert(t){
  let el = document.createElement("div");
  el.innerText = "• " + t;
  document.getElementById("alertList").prepend(el);
}

</script>

</body>
</html>
